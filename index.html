<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EWE Construtora | Links</title>
  <meta name="description" content="EWE Construtora - Excelência em Arquitetura Residencial. Acesse nossos links oficiais.">
  <meta property="og:title" content="EWE Construtora | Links">
  <meta property="og:description" content="Acesse nossos links oficiais - Instagram, Site e ObraSync.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Animated background -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--1" aria-hidden="true"></div>
  <div class="bg-glow bg-glow--2" aria-hidden="true"></div>

  <main class="container">
    <!-- Profile section -->
    <div class="profile animate-in" style="--delay: 0">
      <div class="logo-wrapper">
        <img src="logo.png" alt="EWE Construtora" class="logo" width="90" height="90">
      </div>
      <h1 class="brand-name">EWE Construtora</h1>
      <p class="brand-tagline">Excelência em Arquitetura Residencial</p>
    </div>

    <!-- Links -->
    <nav class="links" aria-label="Links oficiais">
      <a href="https://www.instagram.com/ewe.construtora" target="_blank" rel="noopener noreferrer" class="link-card animate-in" style="--delay: 1">
        <div class="link-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="20" x="2" y="2" rx="5" ry="5"/>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
            <line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/>
          </svg>
        </div>
        <div class="link-content">
          <span class="link-title">Instagram</span>
          <span class="link-subtitle">@ewe.construtora</span>
        </div>
        <div class="link-arrow">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17l9.2-9.2M17 17V7H7"/>
          </svg>
        </div>
      </a>

      <a href="https://www.eweconstrutora.com.br/" target="_blank" rel="noopener noreferrer" class="link-card animate-in" style="--delay: 2">
        <div class="link-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
            <path d="M2 12h20"/>
          </svg>
        </div>
        <div class="link-content">
          <span class="link-title">Site Institucional</span>
          <span class="link-subtitle">eweconstrutora.com.br</span>
        </div>
        <div class="link-arrow">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17l9.2-9.2M17 17V7H7"/>
          </svg>
        </div>
      </a>

      <a href="https://www.youtube.com/@EWEConstrutora" target="_blank" rel="noopener noreferrer" class="link-card animate-in" style="--delay: 3">
        <div class="link-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2.5 17a24.12 24.12 0 0 1 0-10 2 2 0 0 1 1.4-1.4 49.56 49.56 0 0 1 16.2 0A2 2 0 0 1 21.5 7a24.12 24.12 0 0 1 0 10 2 2 0 0 1-1.4 1.4 49.55 49.55 0 0 1-16.2 0A2 2 0 0 1 2.5 17"/>
            <path d="m10 15 5-3-5-3z"/>
          </svg>
        </div>
        <div class="link-content">
          <span class="link-title">YouTube</span>
          <span class="link-subtitle">@EWEConstrutora</span>
        </div>
        <div class="link-arrow">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17l9.2-9.2M17 17V7H7"/>
          </svg>
        </div>
      </a>

      <a href="https://www.useobrasync.com.br" target="_blank" rel="noopener noreferrer" class="link-card link-card--featured animate-in" style="--delay: 4">
        <div class="link-badge">Novo</div>
        <div class="link-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/>
            <path d="M17 18h1"/><path d="M12 18h1"/><path d="M7 18h1"/>
          </svg>
        </div>
        <div class="link-content">
          <span class="link-title">ObraSync</span>
          <span class="link-subtitle">Gerenciador de Obras Inteligente</span>
        </div>
        <div class="link-arrow">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M7 17l9.2-9.2M17 17V7H7"/>
          </svg>
        </div>
      </a>
    </nav>

    <!-- Footer -->
    <footer class="footer animate-in" style="--delay: 4">
      <p>&copy; 2026 EWE Construtora. Todos os direitos reservados.</p>
    </footer>
  </main>

  <script>
    // Intersection Observer for scroll-triggered animations
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.animate-in').forEach(el => observer.observe(el));

    // Parallax effect on background glows
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 30;
      const y = (e.clientY / window.innerHeight - 0.5) * 30;
      document.querySelectorAll('.bg-glow').forEach((glow, i) => {
        const factor = i === 0 ? 1 : -0.6;
        glow.style.transform = `translate(${x * factor}px, ${y * factor}px)`;
      });
    });

    // Ripple effect on link click
    document.querySelectorAll('.link-card').forEach(card => {
      card.addEventListener('click', function(e) {
        const ripple = document.createElement('span');
        ripple.classList.add('ripple');
        const rect = this.getBoundingClientRect();
        ripple.style.left = (e.clientX - rect.left) + 'px';
        ripple.style.top = (e.clientY - rect.top) + 'px';
        this.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
      });
    });
  </script>
</body>
</html>
